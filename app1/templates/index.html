{% extends 'base.html' %}
{% load static %}


{% block title %}Index{% endblock %}
{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/index.css'  %}">
{% endblock %}

{% block form %}
<div class="form">  
    <form action="videos" method="post">
        {% csrf_token %}
        <h2>Date of Recording</h2>
        <div class="inputs">
            <input type="date" name="date">
            <button type="submit" value="Submit">Submit</button>
        </div>        
    </form>
</div>
{% endblock %}

{% block videos %}
<div class="image">
    <img src="{% static 'images/R.jpg'%} " width="1250px" height="800px" alt="image no found in static/images">
</div>

{% endblock %}

{% block scripts %}
<script src="{% static 'js/main.js' %}"></script>
{% endblock %}
